<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Playground Module — 문항 Preset 모음 v0.4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f8fc;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --accent: #4f46e5;
    --accent2: #db2777;
    --radius: 12px;
    --radius-lg: 20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Noto Sans KR", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(247,248,252,0.86);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; gap: 24px;
    height: 60px;
  }
  .logo {
    font-family: "Noto Sans KR", sans-serif;
    font-weight: 800; font-size: 15px;
    color: var(--accent);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .logo span { color: var(--accent2); }
  .search-wrap {
    flex: 1; max-width: 400px;
    position: relative;
  }
  .search-wrap input {
    width: 100%; padding: 8px 14px 8px 36px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px;
    font-family: inherit; outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
  }
  .stats-bar {
    margin-left: auto;
    display: flex; gap: 16px;
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
  }
  .stat { display: flex; flex-direction: column; align-items: flex-end; }
  .stat strong { color: var(--text); font-size: 14px; }

  /* Main layout */
  main { max-width: 1400px; margin: 0 auto; padding: 32px; }

  /* Hero */
  .hero {
    margin-bottom: 40px; padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
  }
  .hero-label {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--accent); letter-spacing: 0.15em;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .hero h1 {
    font-family: "Noto Sans KR", sans-serif; font-size: clamp(28px, 5vw, 52px);
    font-weight: 800; line-height: 1.1;
    background: linear-gradient(135deg, #0f172a 0%, #4f46e5 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .hero p { color: var(--muted); font-size: 15px; max-width: 600px; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
  .pill {
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px; font-family: 'DM Mono', monospace;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  /* Filter tabs */
  .filter-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .filter-btn {
    padding: 6px 16px; border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff; font-weight: 700;
  }

  /* Module grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  /* Module card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    cursor: pointer;
  }
  .card:hover {
    border-color: var(--card-color, var(--accent));
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(15, 23, 42, 0.14);
  }
  .card-header {
    padding: 20px 20px 16px;
    display: flex; align-items: flex-start; gap: 14px;
    border-bottom: 1px solid var(--border);
  }
  .card-emoji {
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
    background: color-mix(in srgb, var(--card-color, #7c6fff) 15%, transparent);
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-title {
    font-family: "Noto Sans KR", sans-serif; font-weight: 700; font-size: 16px;
    color: var(--text); margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .cefr-badge {
    font-family: 'DM Mono', monospace; font-size: 10px;
    padding: 3px 8px; border-radius: 6px;
    background: color-mix(in srgb, var(--card-color, #7c6fff) 20%, transparent);
    color: var(--card-color, var(--accent));
    border: 1px solid color-mix(in srgb, var(--card-color, #7c6fff) 40%, transparent);
    white-space: nowrap; flex-shrink: 0;
  }
  .card-body { padding: 16px 20px; }

  /* Preview table */
  .preview-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  .preview-table th {
    text-align: left; padding: 6px 8px;
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
  }
  .preview-table td {
    padding: 6px 8px; color: var(--text);
    border-bottom: 1px solid rgba(15, 23, 42, 0.08);
    vertical-align: top; line-height: 1.4;
  }
  .preview-table tr:last-child td { border-bottom: none; }
  .badge {
    display: inline-block; padding: 2px 7px;
    border-radius: 6px; font-size: 10px;
    font-family: 'DM Mono', monospace;
  }
  .badge-beginner { background: rgba(107,203,119,0.15); color: #6BCB77; }
  .badge-intermediate { background: rgba(255,193,7,0.15); color: #FFD93D; }
  .badge-advanced { background: rgba(255,107,107,0.15); color: #FF6B6B; }

  .count-chip {
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--muted); float: right; padding-top: 2px;
  }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(15, 23, 42, 0.40); backdrop-filter: blur(10px);
    padding: 20px; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); width: 100%; max-width: 900px;
    margin: auto; overflow: hidden; animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .modal-head {
    padding: 24px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
  }
  .modal-emoji { font-size: 36px; }
  .modal-head h2 { font-family: "Noto Sans KR", sans-serif; font-size: 22px; font-weight: 800; }
  .modal-head p { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .close-btn {
    margin-left: auto; background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); width: 32px; height: 32px; border-radius: 8px;
    cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: color 0.2s;
  }
  .close-btn:hover { color: var(--text); }
  .modal-body { padding: 24px 28px; max-height: 70vh; overflow-y: auto; }
  .modal-body::-webkit-scrollbar { width: 6px; }
  .modal-body::-webkit-scrollbar-track { background: var(--surface2); }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Full table in modal */
  .full-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .full-table th {
    position: sticky; top: 0; z-index: 1;
    background: var(--surface2); padding: 10px 12px;
    text-align: left; font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
    border-bottom: 2px solid var(--border);
  }
  .full-table td {
    padding: 10px 12px; border-bottom: 1px solid rgba(15, 23, 42, 0.08);
    vertical-align: top; line-height: 1.5; color: var(--text);
  }
  .full-table tr:hover td { background: var(--surface2); }
  .full-table tr:last-child td { border-bottom: none; }

  .section-label {
    font-family: "Noto Sans KR", sans-serif; font-weight: 700; font-size: 14px;
    color: var(--text); margin: 20px 0 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .level-section { margin-bottom: 28px; }
  .level-title {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 8px; padding: 6px 10px;
    background: var(--surface2); border-radius: 6px; display: inline-block;
  }

  .word-grid {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
  }
  .word-chip {
    padding: 4px 12px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: 12px; color: var(--text);
  }

  .qa-item {
    padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .qa-item:last-child { border-bottom: none; }
  .qa-q { font-size: 13px; color: var(--text); margin-bottom: 6px; }
  .qa-options { display: flex; flex-wrap: wrap; gap: 6px; }
  .qa-opt {
    padding: 4px 10px; border-radius: 6px; font-size: 12px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
  }
  .qa-opt.correct {
    background: rgba(107,203,119,0.15);
    border-color: rgba(107,203,119,0.4); color: #6BCB77;
  }

  .prompt-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; font-size: 12px;
    color: var(--muted); line-height: 1.6; font-family: 'DM Mono', monospace;
    margin-top: 8px; word-break: break-word;
  }

  .hidden { display: none !important; }

  /* Responsive */
  @media (max-width: 640px) {
    main { padding: 20px 16px; }
    .grid { grid-template-columns: 1fr; }
    header { padding: 0 16px; }
    .stats-bar { display: none; }
  }
</style>
</head>

let currentFilter = 'all';

function setFilter(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function filterModules() {
  renderGrid();
}

function renderGrid() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('moduleGrid');
  let shown = 0;
  grid.innerHTML = '';
  MODULES.forEach(m => {
    const matchFilter = currentFilter === 'all' || m.tags.includes(currentFilter);
    const matchSearch = !q || m.title.toLowerCase().includes(q) || m.desc.toLowerCase().includes(q) || m.cefr.toLowerCase().includes(q);
    if (!matchFilter || !matchSearch) return;
    shown++;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--card-color', m.color);
    card.innerHTML = `
      <div class="card-header">
        <div class="card-emoji">${m.emoji}</div>
        <div class="card-meta">
          <div class="card-title">${m.title}</div>
          <div class="card-desc">${m.desc}</div>
        </div>
        <span class="cefr-badge">${m.cefr}</span>
      </div>
      <div class="card-body">
        <div style="margin-bottom:12px">
          ${m.renderPreview()}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border)">
          <span style="font-family:DM Mono,monospace;font-size:11px;color:var(--muted)">${m.count()}</span>
          <button onclick="openModal(${MODULES.indexOf(m)})" style="padding:6px 14px;border-radius:8px;background:color-mix(in srgb,${m.color} 15%,transparent);border:1px solid color-mix(in srgb,${m.color} 40%,transparent);color:${m.color};font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.2s" onmouseover="this.style.background='color-mix(in srgb,${m.color} 25%,transparent)'" onmouseout="this.style.background='color-mix(in srgb,${m.color} 15%,transparent)'">전체 보기 →</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
  document.getElementById('totalModules').textContent = shown;
}

function openModal(idx) {
  const m = MODULES[idx];
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalHead').innerHTML = `
    <span class="modal-emoji">${m.emoji}</span>
    <div>
      <h2>${m.title}</h2>
      <p>${m.desc} · <span style="color:var(--accent)">${m.cefr}</span> · ${m.count()}</p>
    </div>
    <button class="close-btn" onclick="closeModal()">✕</button>`;
  document.getElementById('modalBody').innerHTML = m.renderFull();
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
